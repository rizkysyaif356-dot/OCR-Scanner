<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access - Login System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bolt-glow1: #a8d4ff;
            --bolt-glow2: #3a8fff;
            --bolt-glow3: #1144cc;
            --flash-color: rgba(180, 220, 255, 0.12);
            --spark: #ffdd88;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #1a2a44 0%, #0d1117 100%);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* ══════════════════════════════
           LIGHTNING BACKGROUND LAYER
        ══════════════════════════════ */

        .sky {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 120% 60% at 50% 0%, #0d1a30 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        .clouds {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 50%;
            background:
                radial-gradient(ellipse 80% 50% at 30% 20%, #1a2a45 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 70% 10%, #162038 0%, transparent 65%),
                radial-gradient(ellipse 100% 60% at 50% 5%, #0e1825 0%, transparent 80%);
            z-index: 0;
            pointer-events: none;
            animation: cloudShift 18s ease-in-out infinite alternate;
        }

        @keyframes cloudShift {
            from { transform: translateX(-12px); filter: brightness(1); }
            to   { transform: translateX(12px);  filter: brightness(1.3); }
        }

        /* Screen flash overlay */
        .screen-flash {
            position: fixed;
            inset: 0;
            background: var(--flash-color);
            pointer-events: none;
            z-index: 1;
            opacity: 0;
        }

        /* ── Lightning columns container ── */
        .lightning-bg {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
        }

        /* Individual bolt column */
        .bolt-col {
            position: relative;
            width: 80px;
            height: 100vh;
            display: flex;
            justify-content: center;
        }

        .bolt-wrap {
            position: absolute;
            top: -10px;
            width: 70px;
            height: 85vh;
        }

        .bolt-wrap svg { width: 100%; height: 100%; overflow: visible; }

        /* Glow layers */
        .g-outer, .g-mid, .g-inner, .g-core, .branch { opacity: 0; }

        /* Ground impact ring */
        .impact {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-radius: 50%;
            background: radial-gradient(ellipse, #a8d4ff 0%, transparent 70%);
            opacity: 0;
        }

        /* Sparks */
        .sparks {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 1px; height: 1px;
        }
        .spark {
            position: absolute;
            width: 3px; height: 3px;
            border-radius: 50%;
            background: var(--spark);
            opacity: 0;
        }
        .spark:nth-child(1) { --tx: -22px; --ty: -18px; }
        .spark:nth-child(2) { --tx:  26px; --ty: -14px; }
        .spark:nth-child(3) { --tx: -12px; --ty: -28px; }
        .spark:nth-child(4) { --tx:  18px; --ty: -24px; }
        .spark:nth-child(5) { --tx:  -6px; --ty: -32px; }
        .spark:nth-child(6) { --tx:  30px; --ty: -10px; }

        /* ── BOLT 1: delay 0s, 3.2s cycle ── */
        .bolt-col:nth-child(1) .bolt-wrap     { animation: boltCycle 3.2s ease-in-out infinite 0s; }
        .bolt-col:nth-child(1) .g-outer       { animation: glowCycle 3.2s ease-in-out infinite 0s; }
        .bolt-col:nth-child(1) .g-mid         { animation: glowCycle 3.2s ease-in-out infinite 0s; }
        .bolt-col:nth-child(1) .g-inner       { animation: glowCycle 3.2s ease-in-out infinite 0s; }
        .bolt-col:nth-child(1) .g-core        { animation: glowCycle 3.2s ease-in-out infinite 0s; }
        .bolt-col:nth-child(1) .branch        { animation: glowCycle 3.2s ease-in-out infinite 0.05s; }
        .bolt-col:nth-child(1) .impact        { animation: impactRing 3.2s ease-in-out infinite 0s; }
        .bolt-col:nth-child(1) .spark         { animation: sparkFly 3.2s ease-in-out infinite; }
        .bolt-col:nth-child(1) .screen-flash-b{ animation: screenFlash 3.2s ease-in-out infinite 0s; }

        /* ── BOLT 2: delay 1.4s, 3.2s cycle ── */
        .bolt-col:nth-child(2) .bolt-wrap     { animation: boltCycle 3.2s ease-in-out infinite 1.4s; }
        .bolt-col:nth-child(2) .g-outer       { animation: glowCycle 3.2s ease-in-out infinite 1.4s; }
        .bolt-col:nth-child(2) .g-mid         { animation: glowCycle 3.2s ease-in-out infinite 1.4s; }
        .bolt-col:nth-child(2) .g-inner       { animation: glowCycle 3.2s ease-in-out infinite 1.4s; }
        .bolt-col:nth-child(2) .g-core        { animation: glowCycle 3.2s ease-in-out infinite 1.4s; }
        .bolt-col:nth-child(2) .branch        { animation: glowCycle 3.2s ease-in-out infinite 1.45s; }
        .bolt-col:nth-child(2) .impact        { animation: impactRing 3.2s ease-in-out infinite 1.4s; }
        .bolt-col:nth-child(2) .spark         { animation: sparkFly 3.2s ease-in-out infinite 1.4s; }

        /* ── BOLT 3: delay 2.6s, 3.2s cycle ── */
        .bolt-col:nth-child(3) .bolt-wrap     { animation: boltCycle 3.2s ease-in-out infinite 2.6s; }
        .bolt-col:nth-child(3) .g-outer       { animation: glowCycle 3.2s ease-in-out infinite 2.6s; }
        .bolt-col:nth-child(3) .g-mid         { animation: glowCycle 3.2s ease-in-out infinite 2.6s; }
        .bolt-col:nth-child(3) .g-inner       { animation: glowCycle 3.2s ease-in-out infinite 2.6s; }
        .bolt-col:nth-child(3) .g-core        { animation: glowCycle 3.2s ease-in-out infinite 2.6s; }
        .bolt-col:nth-child(3) .branch        { animation: glowCycle 3.2s ease-in-out infinite 2.65s; }
        .bolt-col:nth-child(3) .impact        { animation: impactRing 3.2s ease-in-out infinite 2.6s; }
        .bolt-col:nth-child(3) .spark         { animation: sparkFly 3.2s ease-in-out infinite 2.6s; }

        /* ── BOLT 4: delay 0.8s, 3.2s cycle ── */
        .bolt-col:nth-child(4) .bolt-wrap     { animation: boltCycle 3.2s ease-in-out infinite 0.8s; }
        .bolt-col:nth-child(4) .g-outer       { animation: glowCycle 3.2s ease-in-out infinite 0.8s; }
        .bolt-col:nth-child(4) .g-mid         { animation: glowCycle 3.2s ease-in-out infinite 0.8s; }
        .bolt-col:nth-child(4) .g-inner       { animation: glowCycle 3.2s ease-in-out infinite 0.8s; }
        .bolt-col:nth-child(4) .g-core        { animation: glowCycle 3.2s ease-in-out infinite 0.8s; }
        .bolt-col:nth-child(4) .branch        { animation: glowCycle 3.2s ease-in-out infinite 0.85s; }
        .bolt-col:nth-child(4) .impact        { animation: impactRing 3.2s ease-in-out infinite 0.8s; }
        .bolt-col:nth-child(4) .spark         { animation: sparkFly 3.2s ease-in-out infinite 0.8s; }

        /* ══════════════════════════════
           KEYFRAMES
        ══════════════════════════════ */
        @keyframes boltCycle {
            0%,27%  { opacity: 0; filter: brightness(0); }
            30%     { opacity: 1; filter: brightness(1); }
            32%     { opacity: 0.1; }
            34%     { opacity: 1; filter: brightness(2.2); }
            36%     { opacity: 0.35; filter: brightness(0.8); }
            38%     { opacity: 1; filter: brightness(3); }
            55%     { opacity: 0.8; filter: brightness(1.3); }
            75%     { opacity: 0.4; filter: brightness(1); }
            88%     { opacity: 0.08; }
            100%    { opacity: 0; filter: brightness(0); }
        }

        @keyframes glowCycle {
            0%,27%  { opacity: 0; }
            30%     { opacity: 1; }
            32%     { opacity: 0.05; }
            34%     { opacity: 1; }
            36%     { opacity: 0.3; }
            38%     { opacity: 1; }
            58%     { opacity: 0.65; }
            82%     { opacity: 0.1; }
            100%    { opacity: 0; }
        }

        @keyframes screenFlash {
            0%,27%  { opacity: 0; }
            30%     { opacity: 1; }
            34%     { opacity: 0.08; }
            36%     { opacity: 0.6; }
            38%     { opacity: 1; }
            58%     { opacity: 0.2; }
            80%     { opacity: 0; }
            100%    { opacity: 0; }
        }

        @keyframes impactRing {
            0%,28%  { opacity: 0; width: 0;    height: 0; }
            30%     { opacity: 0.9; width: 8px; height: 5px; }
            50%     { opacity: 0.5; width: 70px; height: 22px; }
            72%     { opacity: 0; width: 120px; height: 36px; }
            100%    { opacity: 0; width: 0; height: 0; }
        }

        @keyframes sparkFly {
            0%,27%  { opacity: 0; transform: translate(0,0) scale(1); }
            30%     { opacity: 1; transform: translate(0,0) scale(1.5); }
            60%     { opacity: 0.5; transform: translate(var(--tx), var(--ty)) scale(0.7); }
            82%     { opacity: 0; transform: translate(calc(var(--tx)*1.5), calc(var(--ty)*1.5 + 8px)) scale(0.2); }
            100%    { opacity: 0; }
        }

        /* ══════════════════════════════
           LOGIN CARD
        ══════════════════════════════ */
        .login-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.07);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            backdrop-filter: blur(14px);
            width: 100%;
            max-width: 380px;
            box-shadow:
                0 20px 50px rgba(0,0,0,0.6),
                0 0 40px rgba(58, 143, 255, 0.08),
                inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #f1c40f;
            margin: 0 auto 20px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.3);
        }
        .profile-img img { width: 100%; height: 100%; object-fit: cover; }

        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i {
            position: absolute; left: 15px; top: 50%;
            transform: translateY(-50%); color: #f1c40f;
        }
        .input-group input {
            width: 100%; padding: 15px 15px 15px 45px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px; color: white; outline: none; transition: 0.3s;
            box-sizing: border-box;
        }
        .input-group input:focus {
            border-color: #f1c40f;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.2);
        }

        #btn-login {
            width: 100%; padding: 15px; border: none; border-radius: 50px;
            background: #f1c40f; color: #1a1a1a; font-weight: bold;
            cursor: pointer; transition: 0.3s; letter-spacing: 1px;
        }
        #btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(241, 196, 15, 0.4);
        }

        .error-shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

<!-- ── Lightning Background ── -->
<div class="sky"></div>
<div class="clouds"></div>
<div class="screen-flash"></div>

<div class="lightning-bg">

                <path class="branch"  d="M35 215 L55 280 L44 275 L62 340" stroke="#a8d4ff" stroke-width="4" fill="none" opacity="0.7" stroke-linecap="round"/>
                <path class="branch"  d="M35 215 L55 280 L44 275 L62 340" stroke="#fff"    stroke-width="1.5" fill="none" stroke-linecap="round"/>
            </svg>
        </div>
        <div class="impact"></div>
        <div class="sparks">
            <div class="spark"></div><div class="spark"></div>
            <div class="spark"></div><div class="spark"></div>
            <div class="spark"></div><div class="spark"></div>
        </div>
    </div>

    <!-- Bolt 2 (Centre-left) -->
    <div class="bolt-col">
        <div class="bolt-wrap">
            <svg viewBox="0 0 70 700" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#3a8fff"/><stop offset="45%" stop-color="#a8d4ff"/>
                        <stop offset="75%" stop-color="#ffffff"/><stop offset="100%" stop-color="#3a8fff"/>
                    </linearGradient>
                    <linearGradient id="bc2" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#d0eaff"/><stop offset="50%" stop-color="#ffffff"/><stop offset="100%" stop-color="#d0eaff"/>
                    </linearGradient>
                </defs>
                <path class="g-outer" d="M32 0 L52 180 L30 175 L58 380 L28 370 L55 700" stroke="#1a5fcc" stroke-width="26" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                <path class="g-mid"   d="M32 0 L52 180 L30 175 L58 380 L28 370 L55 700" stroke="#3a8fff" stroke-width="13" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                <path class="g-inner" d="M32 0 L52 180 L30 175 L58 380 L28 370 L55 700" stroke="url(#bg2)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                <path class="g-core"  d="M32 0 L52 180 L30 175 L58 380 L28 370 L55 700" stroke="url(#bc2)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                <path class="branch"  d="M30 175 L10 240 L22 235" stroke="#a8d4ff" stroke-width="4" fill="none" opacity="0.6" stroke-linecap="round"/>
                <path class="branch"  d="M30 175 L10 240 L22 235" stroke="#fff"    stroke-width="1.5" fill="none" stroke-linecap="round"/>
            </svg>
        </div>
        <div class="impact"></div>
        <div class="sparks">
            <div class="spark"></div><div class="spark"></div>
            <div class="spark"></div><div class="spark"></div>
            <div class="spark"></div><div class="spark"></div>
        </div>
    </div>

    <!-- Bolt 3 (Centre-right) -->
    <div class="bolt-col">
        <div class="bolt-wrap">
            <svg viewBox="0 0 70 700" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#3a8fff"/><stop offset="45%" stop-color="#a8d4ff"/>
                        <stop offset="75%" stop-color="#ffffff"/><stop offset="100%" stop-color="#3a8fff"/>
                    </linearGradient>
                    <linearGradient id="bc3" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#d0eaff"/><stop offset="50%" stop-color="#ffffff"/><stop offset="100%" stop-color="#d0eaff"/>
                    </linearGradient>
                </defs>
                <path class="g-outer" d="M40 0 L15 200 L38 194 L12 410 L36 400 L10 700" stroke="#1a5fcc" stroke-width="26" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                <path class="g-mid"   d="M40 0 L15 200 L38 194 L12 410 L36 400 L10 700" stroke="#3a8fff" stroke-width="13" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                <path class="g-inner" d="M40 0 L15 200 L38 194 L12 410 L36 400 L10 700" stroke="url(#bg3)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                <path class="g-core"  d="M40 0 L15 200 L38 194 L12 410 L36 400 L10 700" stroke="url(#bc3)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

                <path class="branch"  d="M36 400 L58 460 L46 454 L64 510" stroke="#fff"    stroke-width="1.5" fill="none" stroke-linecap="round"/>
            </svg>
        </div>
        <div class="impact"></div>
        <div class="sparks">
            <div class="spark"></div><div class="spark"></div>
            <div class="spark"></div><div class="spark"></div>
            <div class="spark"></div><div class="spark"></div>
        </div>
    </div>

    <!-- Bolt 4 (Right) -->
    <div class="bolt-col">
        <div class="bolt-wrap">
            <svg viewBox="0 0 70 700" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#3a8fff"/><stop offset="45%" stop-color="#a8d4ff"/>
                        <stop offset="75%" stop-color="#ffffff"/><stop offset="100%" stop-color="#3a8fff"/>
                    </linearGradient>
                    <linearGradient id="bc4" x1="0" y1="0" x2="0" y2="1">

                <path class="g-mid"   d="M35 0 L55 190 L33 185 L60 395 L30 385 L52 700" stroke="#3a8fff" stroke-width="13" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

            <div class="spark"></div><div class="spark"></div>
            <div class="spark"></div><div class="spark"></div>
        </div>
    </div>

</div><!-- /.lightning-bg -->

<!-- ── Login Card ── -->
<div class="login-card">
    <div class="profile-img">
        <img src="https://i.imgur.com/c3RfkfJ.jpeg" alt="Profile">
    </div>
    <h2 style="color: white; margin: 0;">SECURE ACCESS</h2>
    <p style="color: #f1c40f; font-size: 11px; letter-spacing: 2px; margin-bottom: 30px;">IDENTIFICATION REQUIRED</p>

    <div class="login-form">
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="login-id" placeholder="Agent ID" autocomplete="off">
        </div>
        <div class="input-group">
            <i class="fas fa-key"></i>
            <input type="password" id="login-pass" placeholder="Passcode">
        </div>
        <button id="btn-login" onclick="attemptLogin()">
            <i class="fas fa-unlock-alt"></i> LOGIN SYSTEM
        </button>
    </div>
</div>

<script>
    const VALID_USER = "master";
    const VALID_PASS = "1";

    function attemptLogin() {
        const idInput  = document.getElementById('login-id');
        const passInput = document.getElementById('login-pass');

        if (idInput.value === VALID_USER && passInput.value === VALID_PASS) {
            Swal.fire({
                title: 'ACCESS GRANTED',
                text: 'Identitas terverifikasi. Membuka OCR Scanner...',
                icon: 'success',
                background: '#1a1a1a',
                color: '#fff',
                showConfirmButton: false,
                timer: 1500,
                timerProgressBar: true
            }).then(() => {
                window.location.href = "auth.html";
            });
        } else {
            Swal.fire({
                title: 'ACCESS DENIED',
                text: 'ID Agen atau Passcode salah!',
                icon: 'error',
                background: '#1a1a1a',
                color: '#fff',
                confirmButtonColor: '#f1c40f'
            });
            idInput.parentElement.classList.add('error-shake');
            passInput.parentElement.classList.add('error-shake');
            setTimeout(() => {
                idInput.parentElement.classList.remove('error-shake');
                passInput.parentElement.classList.remove('error-shake');
            }, 500);
        }
    }
</script>
</body>
</html>
